<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>వీరశైవ సూపర్ అడ్మిన్ ప్యానెల్</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #090296; --secondary: #04b03a; --danger: #ff4757; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Telugu', sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        /* Login Screen */
        #adminLoginScreen { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--primary); position: fixed; width: 100%; z-index: 9999; top: 0; left: 0; }
        .login-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; margin-top: 8px; margin-bottom: 20px; outline: none; font-size: 16px; }

        /* Dashboard (Hidden by default) */
        #adminMainContent { padding: 20px; display: none; }
        
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h2 { color: var(--primary); font-size: 30px; }
        
        .table-container { background: white; padding: 20px; border-radius: 15px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: var(--primary); }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }

        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        .btn-notice { background: var(--primary); color: white; border: none; }
        .btn-logout { background: #ff4757; color: white; }
        .error-msg { color: #ff4757; font-size: 13px; margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="adminLoginScreen">
        <div class="login-card">
            <i class="fa fa-user-shield" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2 style="color: var(--primary); margin-bottom: 20px;">అడ్మిన్ లాగిన్</h2>
            <div style="text-align: left;">
                <label style="font-weight: bold;">ఈమెయిల్</label>
                <input type="email" id="adminUser" placeholder="admin@example.com">
                <label style="font-weight: bold;">పాస్ వర్డ్</label>
                <input type="password" id="adminPass" placeholder="••••••••">
            </div>
            <button class="btn btn-notice" style="width: 100%; padding: 15px; justify-content: center;" onclick="checkAdminLogin()">ప్రవేశించు</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <div id="adminMainContent">
        <div class="header">
            <h1><i class="fa fa-gem"></i> వీరశైవం అడ్మిన్</h1>
            <button class="btn btn-logout" onclick="adminLogout()"><i class="fa fa-power-off"></i> Logout</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>మొత్తం సభ్యులు</h3><h2 id="totalCount">0</h2></div>
            <div class="stat-card"><h3>రిక్వెస్ట్‌లు</h3><h2 id="reqCount">0</h2></div>
        </div>

        <div class="table-container">
            <h3 style="margin-bottom: 15px; color: var(--primary);"><i class="fa fa-users"></i> సభ్యుల జాబితా</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>పేరు</th>
                        <th>మొబైల్</th>
                        <th>బ్లడ్</th>
                        <th>ఊరు</th>
                        <th>చర్యలు</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDOp_RBaqwTG7hq4_ZUbm4Clb0_LFXX7qw", 
            authDomain: "veerasaivam-9f4f3.firebaseapp.com", 
            projectId: "veerasaivam-9f4f3", 
            storageBucket: "veerasaivam-9f4f3.firebasestorage.app", 
            messagingSenderId: "69482522926", 
            appId: "1:69482522926:web:c1a2790884eb3c4e05b2bf" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // లాగిన్ ఫంక్షన్
        window.checkAdminLogin = async () => {
            const email = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            const err = document.getElementById('loginError');

            if(!email || !pass) {
                err.innerText = "దయచేసి వివరాలన్నీ నింపండి!";
                err.style.display = 'block';
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                err.style.display = 'none';
            } catch (error) {
                console.error("Firebase Error:", error.code);
                err.innerText = "లాగిన్ కాలేదు: " + error.message;
                err.style.display = 'block';
            }
        };

        // లాగౌట్
        window.adminLogout = () => signOut(auth).then(() => location.reload());

        // సెషన్ మేనేజ్‌మెంట్
        onAuthStateChanged(auth, (user) => {
            const loginSection = document.getElementById('adminLoginScreen');
            const mainSection = document.getElementById('adminMainContent');

            if (user) {
                loginSection.style.display = 'none';
                mainSection.style.display = 'block';
                loadAdminData();
            } else {
                loginSection.style.display = 'flex';
                mainSection.style.display = 'none';
            }
        });

        function loadAdminData() {
            // సభ్యుల వివరాలు లోడ్ చేయడం
            onSnapshot(query(collection(db, "user_registrations"), orderBy("submittedAt", "desc")), (snap) => {
                const body = document.getElementById('adminTableBody');
                body.innerHTML = "";
                document.getElementById('totalCount').innerText = snap.size;
                snap.forEach(d => {
                    const data = d.data();
                    body.innerHTML += `<tr>
                        <td><b>${data.memberId || 'N/A'}</b></td>
                        <td>${data.firstName} ${data.lastName || ''}</td>
                        <td>${data.mobile}</td>
                        <td style="color:red; font-weight:bold;">${data.bloodGroup || '-'}</td>
                        <td>${data.village}</td>
                        <td>
                            <button title="Delete" style="border:none; background:none; color:red; cursor:pointer;" onclick="deleteUser('${d.id}')">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>`;
                });
            });

            // రిక్వెస్ట్ల సంఖ్య
            onSnapshot(collection(db, "phone_requests"), (snap) => {
                document.getElementById('reqCount').innerText = snap.size;
            });
        }

        window.deleteUser = async (id) => {
            if(confirm("ఈ సభ్యుని వివరాలను శాశ్వతంగా తొలగించాలా?")) {
                try {
                    await deleteDoc(doc(db, "user_registrations", id));
                } catch (e) { alert("Error: " + e.message); }
            }
        };
    </script>
</body>
</html>
